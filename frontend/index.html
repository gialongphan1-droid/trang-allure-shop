<!doctype html>
<html lang="vi">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>TrangAllure Shop</title>

		<!-- ✅ Preconnect Cloudinary -->
		<link rel="preconnect" href="https://res.cloudinary.com" />
		<link rel="dns-prefetch" href="https://res.cloudinary.com" />

		<!-- ✅ Preload LCP image -->
		<link
			rel="preload"
			as="image"
			href="https://res.cloudinary.com/dgewjhxjz/image/upload/w_1200,h_400,c_fill,q_auto,f_auto/trangallure/products/yhlfp6em2ahvbrdivvu4.png"
			fetchpriority="high"
		/>

		<!-- ✅ Preconnect Google Fonts - Đã comment (không dùng) -->
		<!-- <link rel="preconnect" href="https://fonts.googleapis.com" /> -->
		<!-- <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /> -->

		<!-- ✅ Defer CSS để không chặn render -->
		<link
			rel="preload"
			as="style"
			href="/assets/index.css"
			onload="this.onload=null;this.rel='stylesheet'"
		/>
		<noscript>
			<link rel="stylesheet" href="/assets/index.css" />
		</noscript>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
