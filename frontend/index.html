<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrangAllure Shop - Mỹ phẩm chính hãng</title>
    
    <!-- ✅ Preconnect Cloudinary -->
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    
    <!-- ✅ Preload LCP image (Đã bỏ fetchpriority để tránh lỗi Firefox) -->
    <link
      rel="preload"
      as="image"
      href="https://res.cloudinary.com/dgewjhxjz/image/upload/w_1200,h_400,c_fill,q_auto,f_auto/trangallure/products/yhlfp6em2ahvbrdivvu4.png"
    />
    
    <!-- ✅ SCHEMA TĨNH CHO WEBSITE -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "TrangAllure Shop",
        "url": "https://trangallure.shop",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://trangallure.shop/san-pham?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    
    <!-- ✅ SCHEMA TĨNH CHO SẢN PHẨM MẪU (Google sẽ đọc) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": "Đồng Hồ Nữ Chính Hãng ibso S1183L Rose mặt Trắng",
        "description": "Đồng hồ nữ chính hãng ibso S1183L, mặt số màu trắng, dây xích kim loại, kích thước 28mm nhỏ xinh.",
        "image": "https://res.cloudinary.com/dgewjhxjz/image/upload/v1782764698/trangallure/products/up5znzatqxea5nth1fis.webp",
        "brand": {
          "@type": "Brand",
          "name": "Ibso"
        },
        "offers": {
          "@type": "Offer",
          "price": "890000",
          "priceCurrency": "VND",
          "availability": "https://schema.org/OutOfStock",
          "url": "https://trangallure.shop/san-pham/dong-ho-nu-chinh-hang-ibso-s1183l-rose-mat-trang"
        }
      }
    </script>
    
    <!-- ✅ Meta tags for SEO -->
    <meta name="description" content="TrangAllure Shop - Mỹ phẩm chính hãng, hàng Authentic 100%, giá tốt nhất thị trường." />
    <meta name="keywords" content="mỹ phẩm, trang điểm, làm đẹp, skincare, son môi, kem nền, TrangAllure" />
    <meta property="og:title" content="TrangAllure Shop - Mỹ phẩm chính hãng" />
    <meta property="og:description" content="Mỹ phẩm chính hãng, hàng Authentic 100%, giá tốt nhất" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://trangallure.shop" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
